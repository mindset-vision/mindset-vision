grid:
  cols: 3
  rows: 4

report:
  max_size_mb: 10

shared:
  canvas_size: [224, 224]
  background_color: [0, 0, 0]

generators:

  # --- visual illusions ---
  ebbinghaus:
    label: "Ebbinghaus Illusion"
    registry_name: ebbinghaus
  muller_lyer:
    label: "Muller-Lyer Illusion"
    registry_name: muller_lyer
  ponzo:
    label: "Ponzo Illusion"
    registry_name: ponzo
  jastrow:
    label: "Jastrow Illusion"
    registry_name: jastrow
  tilt:
    label: "Tilt Illusion"
    registry_name: tilt
  lightness_contrast:
    label: "Lightness Contrast Illusion"
    registry_name: lightness_contrast
  adelson_checkerboard:
    label: "Adelson Checkerboard Illusion"
    registry_name: adelson_checkerboard
  grayscale_shapes:
    label: "Grayscale Shapes"
    registry_name: grayscale_shapes
  thatcher_face:
    label: "Thatcher Illusion (Face)"
    registry_name: thatcher_face
  thatcher_words:
    label: "Thatcher Illusion (Words)"
    registry_name: thatcher_words
    overrides:
      num_words: 4

  # --- low/mid-level vision ---
  amodal_completion:
    label: "Amodal Completion"
    registry_name: amodal_completion
  decomposition:
    label: "Decomposition"
    registry_name: decomposition
  depth_drawings:
    label: "Depth Drawings"
    registry_name: depth_drawings
  emergent_features:
    label: "Emergent Features"
    registry_name: emergent_features
  nap_vs_mp_2d:
    label: "NAP vs MP (2D Lines)"
    registry_name: nap_vs_mp_2d
  nap_vs_mp_3d:
    label: "NAP vs MP (3D Geons)"
    registry_name: nap_vs_mp_3d
  relational_vs_coordinate:
    label: "Relational vs Coordinate"
    registry_name: relational_vs_coordinate
  uncrowding:
    label: "Un-crowding"
    registry_name: uncrowding
  weber_law:
    label: "Weber Law"
    registry_name: weber_law
    overrides:
      num_samples_per_condition: 50
      max_line_length: 15
      min_line_length: 5
      interval_line_length: 5
      max_grayscale: 200
      min_grayscale: 50
      interval_grayscale: 75

  # --- shape and object recognition ---
  global_change:
    label: "Global Change"
    registry_name: global_change
    overrides:
      image_input_folder: "mindset/assets/baker_2018_linedrawings/cropped/"
  transformations_2d:
    label: "2D Transformations"
    registry_name: transformations_2d
  dotted_linedrawings:
    label: "Dotted Linedrawings"
    registry_name: dotted_linedrawings
  embedded_figures:
    label: "Embedded Figures"
    registry_name: embedded_figures
  global_change_baker2022:
    label: "Global Change (Baker 2022)"
    registry_name: global_change_baker2022
  leuven_embedded:
    label: "Leuven Embedded Figures"
    registry_name: leuven_embedded
  linedrawings:
    label: "Linedrawings"
    registry_name: linedrawings
  same_different:
    label: "Same/Different Task"
    registry_name: same_different
  segmented_images:
    label: "Segmented Images"
    registry_name: segmented_images
  silhouettes:
    label: "Silhouettes"
    registry_name: silhouettes
  texturized_blobs:
    label: "Texturized Blobs"
    registry_name: texturized_blobs
  texturized_chars:
    label: "Texturized Linedrawings (Chars)"
    registry_name: texturized_chars
  texturized_lines:
    label: "Texturized Linedrawings (Lines)"
    registry_name: texturized_lines
  viewpoint_invariance:
    label: "Viewpoint Invariance"
    registry_name: viewpoint_invariance
